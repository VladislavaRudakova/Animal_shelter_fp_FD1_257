<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Ysabeau+SC:wght@1..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/animal_shelter_buttons_style.css">
    <link rel="stylesheet" href="styles/animal_shelter_all_pets_style.css">
    <link rel="stylesheet" href="styles/animal_shelter_all_pets_dropdown_style.css">
    <link rel="stylesheet" href="styles/animal_shelter_header_footer_style.css">
    <link rel="stylesheet" href="styles/animal_shelter_menu_style.css">    

    <title>Cat&Dod питомцы</title>
</head>
<body>    
    <div id="back"></div>      
    <icon-sprite></icon-sprite>
    <illustration-sprite></illustration-sprite>
    <custom-header></custom-header> 

    <div id="main-all-pets">

        <div id="main-first-block">
            <div id="title-block">
                <div class="title">выбор питомца по особенностям</div>
                <div class="arrow-main" id="main-arrow-button"><custom-icon name="arrow-bottom"></custom-icon></div>
            </div>

            <div class="pet-search-form-cont" id="pet-search">

                <form id="pet-search-form">
                    <div id="features-1">
                        <div class="pet-select">
                            <label for="kind">питомец</label>
                            <select id="pet-kind" name="kind">
                                <option>кот</option>
                                <option>собака</option>
                            </select>
                        </div>
                        <div class="pet-select">
                            <label for="sex">пол</label>
                            <select id="pet-sex" name="sex">
                                <option>мужской</option>
                                <option>женский</option>
                            </select>
                        </div>
                        <div class="pet-select">

                            <label for="age">возраст</label>
                            <select id="pet-age" name="age">
                        
                            </select>
                        </div>                
                    </div>

                    <div id="features-2">
                        <div class="features" id="pet-color-cont">
                            <div class="features-title"><div>окрас</div><div class="arrow-button" id="color-choice-button"><custom-icon name="arrow-bottom"></custom-icon></div></div>
                            <div id="color-select-cont">
                            <ul class="features" id="pet-color">
                            
                            </ul>
                        </div>

                        </div>

                        <div class="features" id="pet-character-cont">
                            <div class="features-title"><div>характер</div><div class="arrow-button" id="character-choice-button"><custom-icon name="arrow-bottom"></custom-icon></div></div>
                            <div id="character-select-cont">
                            <ul class="features" id="pet-character">
                        
                            </ul>
                        </div>

                        </div>
                    </div>

                    <div id="sub-drop"></div>
                    <div id="features-2-selected"></div>
                    <div>
                        <button id="reset-filter"><div><custom-icon name="close"></custom-icon></div>сбросить</button>
                        <input id="find-pet" type="submit" name="pet-search" value="найти">
                    </div>
                </form>
             </div>
        </div>

 <!------------------------------------------------------------------------------------photo-->
        <div id="pets-slider-container"> <div id="pets-for-adoption"></div></div> <!--загружается через js-->

    </div>
    
    
    <custom-footer></custom-footer>

    <script src="script/component/illustration_sprite.js"></script>
    <script src="script/component/illustration.js"></script>
    <script src="script/component/icon_sprite.js"></script>
    <script src="script/component/icon.js"></script>
    <script src="script/component/menu-component.js"></script>
    <script src="script/component/header_component.js"></script>
    <script src="script/component/footer_component.js"></script>
    
    <script src="script/data/Pet.js"></script>
    <script src="script/data/data.js"></script>
    <script src="script/data/pets.js"></script>
    
    <script src="script/find_all_pets.js"></script>
    <script src="script/get_id_name.js"></script>
    <script src="script/fillSearchSelect.js"></script>
    <script src="script/findPetByFeatures.js"></script>
    <script src="script/menu_script.js"></script>
    <script src="script/pet_search_dropdown_script.js"></script>
</body>
</html>
