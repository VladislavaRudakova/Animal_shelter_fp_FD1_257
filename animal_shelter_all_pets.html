                    </div>
                    <div class="pet-select">

                    </div>

                            <option>8 и более</option>-->
                        </select>
                    </div>                
                </div>

                <div id="features-2">
                    <div class="features" id="pet-color-cont">
                        <div class="features-title"><div>окрас</div><div class="arrow-button" id="color-choice-button"></div></div>
                        <div id="color-select-cont">
                        <ul class="features" id="pet-color">
                        
                        </ul>
                    </div>

                    </div>

                    <div class="features" id="pet-character-cont">
                        <div class="features-title"><div>характер</div><div class="arrow-button" id="character-choice-button"></div></div>
                        <div id="character-select-cont">
                        <ul class="features" id="pet-character">
                    
                        </ul>
                    </div>

                    </div>
                </div>

                <div id="sub-drop">
                    
                    
                </div>



                <div id="features-2-selected"></div>
                <div>
                    <button id="reset-filter"><div><custom-icon name="close"></custom-icon></div>сбросить</button>
                    <input id="find-pet" type="submit" name="pet-search" value="найти">
                </div>

        </form>
</div>
